workflows:
  ios-release:
    name: KOM iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: kom-mobile-app
    
    integrations:
      app_store_connect: KOM Production

    environment:
      node: 20.18.0
      xcode: latest
      cocoapods: default
      vars:
        EXPO_PUBLIC_API_URL: "https://api.kotm.app/api/v1"

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Generate native iOS project
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          # Find the workspace file
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -n 1)
          echo "Using workspace: $WORKSPACE"

          if [ -z "$WORKSPACE" ]; then
            echo "No .xcworkspace file was found under ios/"
            exit 1
          fi

          # Prefer the app scheme and avoid EASClient/Pods helper schemes.
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | sed -n '/Schemes:/,$p' | tail -n +2 | sed 's/^ *//' | grep -v '^$' | grep -v '^Pods-' | grep -v '^EASClient$' | head -n 1)

          if [ -z "$SCHEME" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          fi

          echo "Using scheme: $SCHEME"

          # Build IPA
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        # Use App Store Connect API Key (Required for TestFlight)
        # Add API Key in: Codemagic UI > Teams > Integrations > App Store Connect
        # Then the build will automatically use it
        auth: integration
        
        submit_to_testflight: true