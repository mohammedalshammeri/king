workflows:
  android-release:
    name: KOM Android Release
    max_build_duration: 60
    instance_type: linux_x2
    working_directory: kom-mobile-app

    environment:
      groups:
        - appstore
      node: 20.18.0
      java: 17
      vars:
        EXPO_PUBLIC_API_URL: "https://api.kotm.app/api/v1"

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Generate native Android project
        script: npx expo prebuild --platform android --non-interactive

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

  ios-release:
    name: KOM iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: kom-mobile-app

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.kotm.kom
      groups:
        - appstore
      node: 20.18.0
      xcode: latest
      cocoapods: default
      vars:
        EXPO_PUBLIC_API_URL: "https://api.kotm.app/api/v1"

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Generate native iOS project
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/KingoftheMarket.xcworkspace" \
            --scheme "KingoftheMarket" \
            --archive-flags="-destination 'generic/platform=iOS'"

      - name: Upload to App Store Connect
        script: |
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then
            echo "APP_STORE_CONNECT_PRIVATE_KEY is not set in Codemagic environment variables"
            exit 1
          fi

          key_file="$CM_BUILD_DIR/AuthKey_V6L7CLXXRL.p8"
          printf "%s" "$APP_STORE_CONNECT_PRIVATE_KEY" > "$key_file"

          env -u APP_SPECIFIC_PASSWORD -u APPLE_ID -u APP_STORE_CONNECT_PASSWORD -u APP_STORE_CONNECT_APPLE_ID \
            app-store-connect publish \
              --path "build/ios/ipa/*.ipa" \
              --issuer-id "9391dad5-7a3b-4176-a7bd-cf0af733285b" \
              --key-id "V6L7CLXXRL" \
              --private-key "@file:$key_file" \
              --testflight

    artifacts:
      - build/ios/ipa/*.ipa