workflows:
  android-release:
    name: KOM Android Release
    max_build_duration: 60
    instance_type: linux_x2
    working_directory: kom-mobile-app

    environment:
      groups:
        - appstore
      node: 20.18.0
      java: 17
      vars:
        EXPO_PUBLIC_API_URL: "https://api.kotm.app/api/v1"

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Generate native Android project
        script: npx expo prebuild --platform android --non-interactive

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

  ios-release:
    name: KOM iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: kom-mobile-app

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.kotm.kom
      groups:
        - appstore
      node: 20.18.0
      xcode: latest
      cocoapods: default
      vars:
        EXPO_PUBLIC_API_URL: "https://api.kotm.app/api/v1"

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Generate native iOS project
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/KingoftheMarket.xcworkspace" \
            --scheme "KingoftheMarket" \
            --archive-flags="-destination 'generic/platform=iOS'"

      - name: Upload to App Store Connect
        script: |
          app-store-connect publish \
            --path "build/ios/ipa/*.ipa" \
            --issuer-id "9391dad5-7a3b-4176-a7bd-cf0af733285b" \
            --key-id "J6TS4PCQ4L" \
            --private-key "@file:credentials/AuthKey_J6TS4PCQ4L.p8" \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa