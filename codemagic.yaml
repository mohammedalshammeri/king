workflows:
  ios-release:
    name: KOM iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: kom-mobile-app

    environment:
      node: 20.18.0
      xcode: latest
      cocoapods: default
      vars:
        EXPO_PUBLIC_API_URL: "https://api.kotm.app/api/v1"
        # Add this in Codemagic UI as a secure environment variable:
        # APP_STORE_CONNECT_PASSWORD: your-app-specific-password

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Generate native iOS project
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/*.xcworkspace" \
            --scheme "$(xcode-project detect-scheme)" \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        # Option 1: Use App Store Connect API Key (Recommended)
        # Add these credentials in Codemagic UI under App settings > Team integrations
        # Then uncomment the line below:
        # auth: integration
        
        # Option 2: Use Apple ID and App-specific password
        # Set these as environment variables in Codemagic UI
        apple_id: kalifaum47@gmail.com
        password: $APP_STORE_CONNECT_PASSWORD
        
        submit_to_testflight: true