workflows:
  ios-release:
    name: KOM iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: kom-mobile-app

    environment:
      node: 20.18.0
      xcode: latest
      cocoapods: default
      vars:
        EXPO_PUBLIC_API_URL: "https://api.kotm.app/api/v1"

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Generate native iOS project from Expo
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/*.xcworkspace" \
            --scheme "$(xcode-project detect-scheme)" \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true