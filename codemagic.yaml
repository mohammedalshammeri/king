workflows:
  ios-release:
    name: KOM iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: kom-mobile-app

    environment:
      groups:
        - expo-credentials
      vars:
        EXPO_PUBLIC_API_URL: https://api.kotm.app
        EXPO_USERNAME: bsmc.bh
        EXPO_PASSWORD: Asdf@12341234
      node: 20.18.0

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Install EAS CLI
        script: npm install -g eas-cli

      - name: Expo login
        script: |
          npx expo login -u $EXPO_USERNAME -p $EXPO_PASSWORD

      - name: Build iOS
        script: |
          npx eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait

      - name: Submit to App Store
        script: |
          npx eas submit \
            --platform ios \
            --latest \
            --non-interactive