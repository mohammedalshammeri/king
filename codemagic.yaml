workflows:
  ios-release:
    name: KOM iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: kom-mobile-app

    environment:
      ios_signing:
        provisioning_profiles:
          - kom_app_store_push
        certificates:
          - kom_ios_distribution
      groups:
        - appstore
      node: 20.18.0
      xcode: latest
      cocoapods: default
      vars:
        EXPO_PUBLIC_API_URL: "https://api.kotm.app/api/v1"

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Generate native iOS project
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --custom-export-options='{"method":"app-store","signingStyle":"manual","teamID":"3Q84HM6S5Q","signingCertificate":"Apple Distribution","provisioningProfiles":{"app.kotm.kom":"[expo] app.kotm.kom AppStore 2026-03-25T11:52:06.400Z"}}'

      - name: Build IPA
        script: |
          cat > export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>3Q84HM6S5Q</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                <key>app.kotm.kom</key>
                  <string>[expo] app.kotm.kom AppStore 2026-03-25T11:52:06.400Z</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcode-project build-ipa \
            --workspace "ios/KingoftheMarket.xcworkspace" \
            --scheme "KingoftheMarket" \
            --export-options-plist export_options.plist \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa