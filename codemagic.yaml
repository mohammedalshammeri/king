workflows:
  ios-release:
    name: KOM iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: kom-mobile-app
    
    integrations:
      app_store_connect: KOM Production

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.kotm.kom
      node: 20.18.0
      xcode: latest
      cocoapods: default
      vars:
        EXPO_PUBLIC_API_URL: "https://api.kotm.app/api/v1"

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Generate native iOS project
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          WORKSPACE="ios/KingoftheMarket.xcworkspace"
          SCHEME="KingoftheMarket"

          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        # Use App Store Connect API Key (Required for TestFlight)
        # Add API Key in: Codemagic UI > Teams > Integrations > App Store Connect
        # Then the build will automatically use it
        auth: integration
        
        submit_to_testflight: true