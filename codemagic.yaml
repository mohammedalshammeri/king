workflows:
  ios-release:
    name: KOM iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: .

    environment:
      groups:
        - expo-credentials
      vars:
        EXPO_PUBLIC_API_URL: https://api.kotm.app
        EAS_PROJECT_ID: 38364066-6118-4eb7-ad6a-22eeecd37a69
        APP_STORE_CONNECT_ISSUER_ID: 9391dad5-7a3b-4176-a7bd-cf0af733285b
        APP_STORE_CONNECT_KEY_IDENTIFIER: J6TS4PCQ4L
        EXPO_USERNAME: bsmc.bh
        EXPO_PASSWORD: Asdf@12341234
      node: 20.18.0

    scripts:
      - name: Install dependencies
        script: |
          cd kom-mobile-app
          npm ci

      - name: Install EAS CLI
        script: npm install -g eas-cli@latest

      - name: Expo login
        script: |
          npx expo login -u $EXPO_USERNAME -p $EXPO_PASSWORD

      - name: Build iOS IPA (local on Codemagic Mac)
        script: |
          cd kom-mobile-app
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            

      - name: Submit to App Store
        script: |
          cd kom-mobile-app
          eas submit \
            --platform ios \
            --path /tmp/KOM.ipa \
            --non-interactive

    artifacts:
      - /tmp/KOM.ipa