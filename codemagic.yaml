workflows:
  ios-release:
    name: KOM iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: kom-mobile-app

    environment:
      vars:
        EXPO_PUBLIC_API_URL: https://api.kotm.app
        EAS_PROJECT_ID: 38364066-6118-4eb7-ad6a-22eeecd37a69
        APP_STORE_CONNECT_ISSUER_ID: 9391dad5-7a3b-4176-a7bd-cf0af733285b
        APP_STORE_CONNECT_KEY_IDENTIFIER: J6TS4PCQ4L
        # APP_STORE_CONNECT_PRIVATE_KEY: add this in Codemagic UI → Environment variables (secret)
        # EXPO_TOKEN: add this in Codemagic UI → Environment variables (secret)
      node: 20.18.0

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Install EAS CLI
        script: npm install -g eas-cli@latest

      - name: Build iOS IPA (EAS local)
        script: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --local \
            --output $CM_BUILD_DIR/KOM.ipa

    artifacts:
      - $CM_BUILD_DIR/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
