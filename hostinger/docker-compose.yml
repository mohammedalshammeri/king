services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  backend:
    build:
      context: ../kom-backend/kom-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend.env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/v1/health/ready').then((res) => { if (!res.ok) process.exit(1); process.exit(0); }).catch(() => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    ports:
      - "127.0.0.1:3003:3000"

  admin:
    build:
      context: ../kom-admin-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.kotm.app/api/v1
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3002:3000"

  landing:
    build:
      context: ../kom-landing
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:80"

volumes:
  caddy_data:
  caddy_config: