app = "kom-api"
primary_region = "cdg"

[build]

[deploy]
  release_command = "npx prisma migrate deploy"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  API_PREFIX = "api/v1"

[http_service]
  internal_port = 3000
  force_https = true

  # ✅ يخليه ينام لتقليل التكلفة، لكن يقوم تلقائيًا عند أول طلب
  auto_stop_machines = "stop"
  auto_start_machines = true

  # ✅ نخليه صفر عشان ينام، لكن راح نسرّع الاستيقاظ بالـ checks + warm ping (اختياري)
  min_machines_running = 1

  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 80

  # ✅ Health Check يخلي Fly يثبت جاهزية الماشين بسرعة بعد الاستيقاظ
  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
    method = "GET"
    path = "/api/v1/health/live"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1